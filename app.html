<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conference App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">

  <header class="app-header">
    <span class="app-header-title">&#9733; Conference</span>
    <div class="app-user">
      <span class="app-handle" id="user-handle"></span>
      <button class="btn btn-sm btn-ghost" id="btn-logout">Log out</button>
    </div>
  </header>

  <main class="app-main">
    <div class="welcome-card">
      <h2>Welcome, <span class="welcome-handle" id="welcome-handle"></span> 👋</h2>
      <p>You're signed in. More features coming soon.</p>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
